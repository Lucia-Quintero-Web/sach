<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Página no encontrada | S.A.C.H. Neo-Medical</title>
    <link rel="stylesheet" href="./css/globals.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F4C5C',
                        accent: '#00BFA6',
                        background: '#F8FAFC',
                        danger: '#FF5F5F',
                        dark: '#0B1120',
                        secondary: '#64748B',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        soft: '0 10px 30px rgba(0,0,0,0.05)',
                        glow: '0 0 20px rgba(0,191,166,0.3)',
                    },
                }
            }
        }
    </script>

    <style>
        /* ── Tooth SVG float animation ── */
        @keyframes toothFloat {

            0%,
            100% {
                transform: translateY(0px) rotate(-3deg);
            }

            50% {
                transform: translateY(-18px) rotate(3deg);
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(57, 255, 20, 0.15), 0 0 60px rgba(0, 191, 166, 0.1);
            }

            50% {
                box-shadow: 0 0 60px rgba(57, 255, 20, 0.35), 0 0 100px rgba(0, 191, 166, 0.2);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scanline {
            0% {
                top: -10%;
            }

            100% {
                top: 110%;
            }
        }

        .tooth-anim {
            animation: toothFloat 4s ease-in-out infinite;
        }

        .glow-ring {
            animation: glowPulse 3s ease-in-out infinite;
        }

        .fade-up {
            animation: fadeInUp 0.8s ease forwards;
        }

        .fade-up-2 {
            animation: fadeInUp 0.8s ease 0.15s forwards;
            opacity: 0;
        }

        .fade-up-3 {
            animation: fadeInUp 0.8s ease 0.3s forwards;
            opacity: 0;
        }

        .scanline::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 49%, rgba(0, 191, 166, 0.06) 50%, transparent 51%);
            animation: scanline 3s linear infinite;
            pointer-events: none;
        }
    </style>
</head>

<body
    class="bg-background text-dark font-sans min-h-screen flex flex-col items-center justify-center overflow-hidden relative">

    <!-- ── Fondo decorativo ── -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <!-- Grid pattern -->
        <div class="absolute inset-0 opacity-[0.025]"
            style="background-image: linear-gradient(#0F4C5C 1px,transparent 1px),linear-gradient(90deg,#0F4C5C 1px,transparent 1px); background-size:40px 40px;">
        </div>
        <!-- Blobs de color -->
        <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full opacity-10"
            style="background:radial-gradient(circle,#00BFA6,transparent 70%);"></div>
        <div class="absolute -bottom-40 -right-40 w-[600px] h-[600px] rounded-full opacity-10"
            style="background:radial-gradient(circle,#39FF14,transparent 70%);"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] rounded-full opacity-5"
            style="background:radial-gradient(circle,#0F4C5C,transparent 70%);"></div>
    </div>

    <!-- ── Card principal ── -->
    <div class="relative z-10 flex flex-col items-center text-center px-8 max-w-2xl w-full">

        <!-- Diente flotante -->
        <div class="relative mb-10 tooth-anim">
            <!-- Halo de brillo -->
            <div class="absolute inset-0 rounded-full glow-ring"
                style="background:rgba(57,255,20,0.08); width:180px; height:180px; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:50%;">
            </div>

            <!-- Ícono del diente Neo-Medical -->
            <div class="w-40 h-40 rounded-[40px] flex items-center justify-center relative scanline overflow-hidden"
                style="background:linear-gradient(135deg,#0F4C5C 0%,#0a3545 100%); box-shadow:0 20px 60px rgba(15,76,92,0.4);">
                <!-- Código de error superpuesto -->
                <div class="absolute top-3 left-0 right-0 flex justify-center">
                    <span class="text-[8px] font-extrabold tracking-[0.3em] uppercase"
                        style="color:rgba(57,255,20,0.6);">ERROR</span>
                </div>
                <!-- SVG muela -->
                <svg class="w-20 h-20 relative z-10" viewBox="0 0 100 100" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <!-- Muela simplificada -->
                    <path d="M25 30 C25 20 35 15 45 18 C48 16 52 16 55 18 C65 15 75 20 75 30
                             C78 45 72 62 68 72 C65 80 60 85 58 82 C55 78 53 70 50 68
                             C47 70 45 78 42 82 C40 85 35 80 32 72 C28 62 22 45 25 30Z" fill="#00BFA6" opacity="0.9" />
                    <!-- Raíces -->
                    <path d="M42 82 C40 90 38 96 37 98" stroke="#00BFA6" stroke-width="3" stroke-linecap="round"
                        opacity="0.6" />
                    <path d="M58 82 C60 90 62 96 63 98" stroke="#00BFA6" stroke-width="3" stroke-linecap="round"
                        opacity="0.6" />
                    <!-- Surco central -->
                    <path d="M42 40 C44 48 48 52 50 54 C52 52 56 48 58 40" stroke="white" stroke-width="2"
                        stroke-linecap="round" opacity="0.4" fill="none" />
                    <!-- Número 404 dentro -->
                    <text x="50" y="38" text-anchor="middle" font-family="Inter" font-weight="900" font-size="14"
                        fill="white" opacity="0.95">404</text>
                </svg>
                <!-- Esquina de branding -->
                <div class="absolute bottom-2 right-2 text-[6px] font-extrabold tracking-widest"
                    style="color:rgba(57,255,20,0.5);">JVC</div>
            </div>
        </div>

        <!-- Texto principal -->
        <div class="fade-up">
            <h1 class="font-display font-black text-5xl md:text-6xl text-dark tracking-tight leading-none mb-4">
                Vaya, parece que<br>
                <span
                    style="background:linear-gradient(135deg,#0F4C5C,#00BFA6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">
                    este diente no existe.
                </span>
            </h1>
        </div>

        <div class="fade-up-2">
            <p class="text-secondary text-lg font-medium mt-4 mb-2 max-w-md">
                La página que buscas no fue encontrada en el sistema S.A.C.H.
                Es posible que la ruta haya cambiado o no exista.
            </p>
            <!-- Código técnico estilo terminal -->
            <div class="mt-5 mb-8 inline-flex items-center gap-3 px-5 py-3 rounded-2xl border"
                style="background:rgba(15,76,92,0.05); border-color:rgba(15,76,92,0.1);">
                <span class="w-2 h-2 rounded-full bg-danger animate-pulse"></span>
                <code
                    class="font-mono text-sm text-secondary font-bold">GET <span class="text-danger" id="bad-path">—</span> → 404 Not Found</code>
            </div>
        </div>

        <!-- CTA -->
        <div class="fade-up-3 flex flex-col sm:flex-row gap-4 items-center">
            <a href="./index.html"
                class="inline-flex items-center gap-3 px-8 py-4 rounded-2xl font-bold text-white text-sm uppercase tracking-widest transition-all hover:scale-105 hover:shadow-2xl"
                style="background:linear-gradient(135deg,#0F4C5C,#00BFA6); box-shadow:0 8px 30px rgba(0,191,166,0.4);">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Volver al Inicio
            </a>
            <button onclick="history.back()"
                class="inline-flex items-center gap-2 px-6 py-4 rounded-2xl font-bold text-secondary text-sm uppercase tracking-widest bg-white border border-black/5 shadow-soft hover:bg-slate-50 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="2" stroke-linecap="round" />
                </svg>
                Página anterior
            </button>
        </div>
    </div>

    <!-- ── Footer JVCreative ── -->
    <div class="absolute bottom-6 left-0 right-0 flex flex-col items-center gap-2 opacity-40">
        <img src="./logoJVCreative.svg" alt="JVCreative" class="h-6 brightness-0" onerror="this.style.display='none'">
        <p class="text-[9px] font-bold text-secondary uppercase tracking-[0.3em]">
            S.A.C.H. Neo-Medical &nbsp;·&nbsp; Desarrollado por JVCreative &nbsp;·&nbsp; RUC: 0152525549001
        </p>
    </div>

    <script>
        // Mostrar la ruta mala en el terminal 404
        const pathEl = document.getElementById('bad-path');
        if (pathEl) pathEl.textContent = window.location.pathname || '/ruta-desconocida';
    </script>

</body>

</html>
