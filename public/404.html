<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.C.H. Lucia Quintero | Neo-Medical</title>
    <link rel="stylesheet" href="./css/globals.css">

    <!-- Design System Fonts: Inter (Titles) & Plus Jakarta Sans (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F4C5C',      /* Deep Teal/Steel */
                        accent: '#00BFA6',       /* Mint Medical */
                        background: '#F8FAFC',   /* Soft Gray/Ice */
                        danger: '#FF5F5F',       /* Alert/Danger */
                        dark: '#0B1120',         /* Deep Navy Text */
                        secondary: '#64748B',    /* Cool Slate */
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 30px rgba(0,0,0,0.05)',
                        'glow': '0 0 20px rgba(0,191,166,0.3)',
                    },
                    borderRadius: {
                        'sach': '12px',
                        'card': '24px',
                        'modal': '24px',
                    },
                    backdropBlur: {
                        'glass': '10px',
                    }
                }
            }
        }
    </script>

    <!-- Core Libraries loaded via npm (see js/data/supabase-client.js) -->
</head>

<body class="bg-background text-dark font-sans h-screen overflow-hidden flex">

    <!-- Desktop Sidebar (Glassmorphism & Deep Teal Palette) -->
    <aside
        class="hidden md:flex flex-col w-72 bg-primary text-white h-full shadow-2xl z-20 transition-all duration-300 relative">
        <!-- Brand -->
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-glow">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
            </div>
            <span class="font-display font-bold text-2xl tracking-tight">S.A.C.H.</span>
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 py-8 space-y-2" id="desktop-nav">
            <a href="#"
                class="nav-item flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 text-white/70 hover:text-white hover:bg-white/10 font-bold mb-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                Dashboard
            </a>
            <a href="#"
                class="nav-item flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 text-white/70 hover:text-white hover:bg-white/10 font-bold mb-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Pacientes
            </a>
            <a href="#"
                class="nav-item flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 text-white/70 hover:text-white hover:bg-white/10 font-bold mb-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                Agenda
            </a>
            <a href="#"
                class="nav-item flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 text-white/70 hover:text-white hover:bg-white/10 font-bold mb-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Abonos
            </a>
            <div class="pt-4 mt-4 border-t border-white/10">
                <a href="./manual.html" target="_blank"
                    class="flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all duration-200 text-accent/80 hover:text-white hover:bg-white/10 font-bold">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    Manual de Usuario
                </a>
            </div>
        </nav>

        <!-- Profile Widget -->
        <div class="p-6">
            <div class="bg-black/20 p-4 rounded-card flex items-center gap-3 border border-white/5 shadow-soft">
                <img src="https://ui-avatars.com/api/?name=Lucia+Quintero&background=00BFA6&color=fff"
                    class="w-10 h-10 rounded-full border-2 border-accent">
                <div class="overflow-hidden">
                    <p class="font-bold text-sm truncate">Dra. Lucia Quintero</p>
                    <p class="text-[10px] text-accent uppercase tracking-widest font-bold">Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main ContentWrapper -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">

        <!-- Topbar -->
        <header
            class="h-20 px-8 flex items-center justify-between sticky top-0 z-10 bg-background/80 backdrop-blur-glass border-b border-gray-100">
            <!-- Mobile Menu Toggle -->
            <button class="md:hidden text-primary">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2.5" stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <!-- Contextual Breadcrumbs/Search -->
            <div class="hidden md:flex items-center gap-4 bg-white px-4 py-2.5 rounded-xl shadow-soft w-[400px]">
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" placeholder="Buscar pacientes o expedientes..."
                    class="bg-transparent border-none outline-none text-sm font-medium w-full text-dark placeholder:text-gray-400">
            </div>

            <!-- Global Actions -->
            <div class="flex items-center gap-4">
                <div id="online-status"
                    class="flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-soft text-xs font-bold text-accent">
                    <span class="w-2 h-2 rounded-full bg-accent animate-pulse shadow-glow"></span>
                    Online
                </div>
                <button
                    class="w-10 h-10 bg-white rounded-xl shadow-soft flex items-center justify-center text-secondary hover:text-primary transition-colors relative">
                    <span class="absolute top-2 right-2 w-2 h-2 bg-danger rounded-full ring-2 ring-white"></span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Route Content Area -->
        <main id="app" class="flex-1 overflow-y-auto p-4 sm:p-8">
            <!-- Vistas renderizadas aquí por app.js -->
        </main>
    </div>

    <!-- Mobile Bottom Navigation (Glassmorphism) -->
    <div
        class="md:hidden fixed bottom-4 left-4 right-4 bg-primary/95 backdrop-blur-glass p-2 rounded-card shadow-soft flex justify-around border border-white/10 z-50">
        <button class="flex flex-col items-center gap-1 p-2 text-accent">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                <path
                    d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
            </svg>
            <span class="text-[9px] font-bold">Principal</span>
        </button>
        <button class="flex flex-col items-center gap-1 p-2 text-white/50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"
                    stroke-width="2" />
            </svg>
            <span class="text-[9px] font-bold">Pacientes</span>
        </button>
        <button class="flex flex-col items-center gap-1 p-2 text-white/50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
                    stroke-width="2" />
            </svg>
            <span class="text-[9px] font-bold">Agenda</span>
        </button>
        <button class="flex flex-col items-center gap-1 p-2 text-white/50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    stroke-width="2" />
            </svg>
            <span class="text-[9px] font-bold">Finanzas</span>
        </button>
    </div>

    <script type="module" src="./js/app.js"></script>
    <script>
        // Adjust App.js active link behavior for Sidebar
        document.addEventListener('DOMContentLoaded', () => {
            const desktopLinks = document.querySelectorAll('#desktop-nav .nav-item');
            desktopLinks.forEach(link => {
                link.addEventListener('click', () => {
                    desktopLinks.forEach(l => {
                        l.classList.remove('bg-white/10', 'text-white');
                        l.classList.add('text-white/70');
                    });
                    link.classList.remove('text-white/70');
                    link.classList.add('bg-white/10', 'text-white');
                });
            });
        });

    </script>
</body>

</html>
